name: barbershop_app
description: Premium Barber Shop Demo App for international clients
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Supabase
  supabase_flutter: ^2.3.4

  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1
  lottie: ^3.0.0
  fl_chart: ^0.66.2

  # Navigation
  go_router: ^13.0.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.1.0
  dotted_border: ^2.1.0
  glassmorphism: ^3.0.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  share_plus: ^7.2.2
  qr_flutter: ^4.1.0
  confetti: ^0.7.0

  # Storage & Security
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
